# Note: this repo is patterns + a runnable example, no requirements.txt.
name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff pyyaml
      - name: Lint
        run: ruff check examples
      - name: Run example (self-contained, no external services)
        run: python examples/secure_agent.py
