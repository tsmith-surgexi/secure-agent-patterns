name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff pytest
      - name: Lint
        run: ruff check examples tests
      - name: Run guardrail tests
        run: pytest -q
      - name: Run example (self-contained, no external services)
        run: python examples/secure_agent.py
